services:

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    container_name: warframe-dropview-api
    build:
      context: ./backend      # folder sent to the Docker daemon (build context)
      dockerfile: Dockerfile  # path to the Dockerfile inside that context
    ports:
      - "8080:8080"           # host:container — reach the API at http://localhost:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Override the connection string so the API reaches the mongodb service
      # by its service name instead of "localhost".
      - MongoDB__ConnectionString=mongodb://mongodb:27017
      - MongoDB__DatabaseName=warframedrop-mongodb
    depends_on:
      mongodb:
        condition: service_healthy  # wait until MongoDB passes its health check
    networks:
      - warframe-net
    restart: unless-stopped

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    container_name: warframe-dropview-mongodb
    image: mongo:8
    ports:
      - "27017:27017"         # expose to the host so tools like Compass can connect
    volumes:
      - mongodb_data:/data/db # named volume — data survives container restarts
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - warframe-net
    restart: unless-stopped

# ── Shared network ────────────────────────────────────────────────────────────
# Services on the same network can reach each other by service name (e.g. "mongodb").
networks:
  warframe-net:
    driver: bridge

# ── Named volumes ─────────────────────────────────────────────────────────────
# Managed by Docker; data persists even when containers are removed.
volumes:
  mongodb_data:
