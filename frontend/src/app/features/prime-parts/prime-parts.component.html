<div class="prime-parts-container">
  <div class="filter-container">
    <p-floatlabel>
      <p-multiselect
        id="multiselect-rarities"
        class="multiselect-rarities"
        [options]="rarities"
        [ngModel]="selectedRarities()"
        (ngModelChange)="selectedRarities.set($event)"
        [maxSelectedLabels]="3"
        display="chip"
        [filter]="false"
      />
      <label for="multiselect-rarities">Rarities</label>
    </p-floatlabel>

    <p-floatlabel>
      <p-multiselect
        id="multiselect-relic-tiers"
        class="multiselect-relic-tiers"
        [options]="tiers"
        [ngModel]="selectedTiers()"
        (ngModelChange)="selectedTiers.set($event)"
        [maxSelectedLabels]="3"
        display="chip"
        [filter]="false"
      />
      <label for="multiselect-relic-tiers">Tiers</label>
    </p-floatlabel>

    <p-floatlabel>
      <p-multiselect
        id="multiselect-relic-refinements"
        class="multiselect-relic-refinements"
        [options]="refinements"
        [ngModel]="selectedRefinements()"
        (ngModelChange)="selectedRefinements.set($event)"
        [maxSelectedLabels]="3"
        display="chip"
        [filter]="false"
      />
      <label for="multiselect-relic-refinements">Refinements</label>
    </p-floatlabel>
  </div>

  <h2 class="prime-parts-header">Relic drops</h2>

  @if (itemName() === null) {
    <p>Use the search bar above to find prime parts.</p>
  } @else if (search.error()) {
    <p>{{ search.error() }}</p>
  } @else if (search.loading() && search.items().length === 0) {
    <p>Loading…</p>
  } @else {
    <app-relic-drop-table class="prime-part-component"
      [drops]="search.items()"
      [hasMore]="search.hasMore()"
      [loading]="search.loading()"
      (loadMore)="search.loadMore()"
    />
  }
</div>
