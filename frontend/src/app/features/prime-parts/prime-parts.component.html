<div class="prime-parts-container">
  <div class="filter-container">
    <p-floatlabel>
      <p-multiselect
        id="multiselect-rarities"
        class="multiselect-rarities"
        [options]="rarities"
        [ngModel]="selectedRarities()"
        (ngModelChange)="selectedRarities.set($event)"
        [maxSelectedLabels]="3"
        display="chip"
        filter="false"
      />
      <label for="multiselect-rarities">Rarities</label>
    </p-floatlabel>

    <p-floatlabel>
      <p-multiselect
        id="multiselect-relic-tiers"
        class="multiselect-relic-tiers"
        [options]="relicTiers"
        [ngModel]="selectedRelicTiers()"
        (ngModelChange)="selectedRelicTiers.set($event)"
        [maxSelectedLabels]="3"
        display="chip"
        filter="false"
      />
      <label for="multiselect-relic-tiers">Relic Tiers</label>
    </p-floatlabel>
  </div>

  <h2 class="prime-parts-header">Relic drops</h2>

  @if (result() === undefined) {
    <p>Loading…</p>
  } @else if (result() === null) {
    <p>Use the search bar above to find prime parts.</p>
  } @else {
    <app-relic-drop-table [drops]="result()!.relicDrops" />
  }
</div>
