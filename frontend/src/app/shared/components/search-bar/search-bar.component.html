<div class="search-bar">
  <input class="search-input" type="text" [(ngModel)]="searchTerm" 
    placeholder="What item are you looking for?"  (keyup.enter)="onSearch()" />

  <select class="active-context-select" [ngModel]="activeContext" (ngModelChange)="onContextChange($event)">
    @for (ctx of contexts; track ctx.value) {
      <option [value]="ctx.value">{{ ctx.label }}</option>
    }
  </select>
</div>
