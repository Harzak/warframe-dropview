@if (drops.length > 0) {
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Enemy</th>
        <th>Drop Rate</th>
        <th>Rarity</th>
      </tr>
    </thead>
    <tbody>
      @for (drop of drops; track drop.name + drop.enemyName) {
        <tr>
          <td>{{ drop.name }}</td>
          <td>{{ drop.type }}</td>
          <td>{{ drop.enemyName }}</td>
          <td>{{ drop.dropRate | number: '1.2-2' }}%</td>
          <td>{{ drop.rarity }}</td>
        </tr>
      }
    </tbody>
  </table>
} @else {
  <p>No enemy drops found.</p>
}
