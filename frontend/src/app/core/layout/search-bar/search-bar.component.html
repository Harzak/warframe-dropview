<div class="search-bar">
  <input class="search-input" type="text" pInputText [ngModel]="searchTerm()"
    (ngModelChange)="searchTerm.set($event)"
    placeholder="What item are you looking for?" (keyup.enter)="onSearch()" />

  <p-select
    class="active-context-select"
    [options]="contexts"
    [ngModel]="activeContext()"
    (ngModelChange)="activeContext.set($event)"
    optionLabel="label"
    optionValue="value"
    (onChange)="onContextChange()"
    appendTo="body" />
</div>
